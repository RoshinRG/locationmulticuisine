<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Menu Management | Admin | Location Restaurant</title>

  <link rel="stylesheet" href="../css/admin.css">

</head>

<body>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <aside class="admin-sidebar" id="adminSidebar">

    <div class="sidebar-brand">

      <div class="logo-icon">🍽️</div>

      <div class="brand-text">

        <span class="name">Location Restaurant</span>

        <span class="role">Admin Panel</span>

      </div>

    </div>

    <nav class="sidebar-nav">

      <div class="nav-section-label">Main</div>

      <a href="admin-dashboard.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>

      <a href="admin-orders.html" class="sidebar-link"><span class="icon">📦</span> Orders <span class="nav-badge" id="pendingOrdersBadge"></span></a>

      <a href="admin-reservations.html" class="sidebar-link"><span class="icon">📅</span> Reservations <span class="nav-badge gold" id="pendingResBadge"></span></a>

      <div class="nav-section-label">Management</div>

      <a href="admin-menu.html" class="sidebar-link active"><span class="icon">🍛</span> Menu Items</a>

      <a href="admin-billing.html" class="sidebar-link"><span class="icon">🧾</span> Billing</a>

      <div class="nav-section-label">Account</div>

      <a href="../index.html" class="sidebar-link"><span class="icon">🌐</span> View Site</a>

      <a href="#" class="sidebar-link" onclick="adminLogout()"><span class="icon">🚪</span> Logout</a>

    </nav>

    <div class="sidebar-footer">

      <div class="sidebar-user">

        <div class="user-avatar" id="adminAvatar">A</div>

        <div class="user-info">

          <span class="uname" id="adminUserName">Admin</span>

          <span class="urole" id="adminUserRole">Administrator</span>

        </div>

        <button class="logout-btn" onclick="adminLogout()" title="Logout">🚪</button>

      </div>

    </div>

  </aside>



  <main class="admin-main">

    <header class="admin-topbar">

      <div class="topbar-left">

        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

        <div>

          <div class="page-title">Menu Management</div>

          <div class="page-breadcrumb">Create and manage restaurant dishes</div>

        </div>

      </div>

      <div class="topbar-right">

        <button class="btn-sm btn-gold" onclick="openMenuModal()">➕ Add New Item</button>

      </div>

    </header>



    <div class="admin-content">

      <div class="data-section">

        <div class="data-header">

          <h3>Menu Items</h3>

          <div class="data-actions">

            <select class="filter-select" id="catFilter" onchange="loadMenu()">

              <option value="">All Categories</option>

              <option value="SOUTH INDIAN">South Indian</option>

              <option value="SEAFOOD">Seafood</option>

              <option value="NORTH INDIAN">North Indian</option>

              <option value="CHINESE">Chinese</option>

              <option value="DRINKS">Drinks</option>

            </select>

            <input type="text" class="search-sm" id="menuSearch" placeholder="Search dish..." oninput="loadMenu()">

          </div>

        </div>

        <div class="table-responsive">

          <table>

            <thead>

              <tr>

                <th>Image</th>

                <th>Name</th>

                <th>Category</th>

                <th>Price</th>

                <th>Description</th>

                <th>Status</th>

                <th>Actions</th>

              </tr>

            </thead>

            <tbody id="menuTable">

              <tr><td colspan="7" class="admin-loading-spinner"><div class="spinner"></div></td></tr>

            </tbody>

          </table>

        </div>

      </div>

    </div>

  </main>



  <!-- Menu Modal -->

  <div class="admin-modal-overlay" id="menuModal">

    <div class="admin-modal" style="max-width:550px">

      <div class="admin-modal-header">

        <h3 id="modalTitle">Add Menu Item</h3>

        <button class="modal-close-btn" onclick="closeMenuModal()">✕</button>

      </div>

      <form id="menuForm">

        <div class="admin-modal-body">

          <input type="hidden" id="itemId">

          <div class="admin-form-group">

            <label>Dish Name *</label>

            <input type="text" id="itemName" required placeholder="e.g. Butter Chicken">

          </div>

          <div class="form-row-2">

            <div class="admin-form-group">

              <label>Category *</label>

              <select id="itemCategory" required>

                <option value="SOUTH INDIAN">South Indian</option>

                <option value="NORTH INDIAN">North Indian</option>

                <option value="SEAFOOD">Seafood</option>

                <option value="CHINESE">Chinese</option>

                <option value="KIZHI AND DUM">Kizhi &amp; Dum</option>

                <option value="DRINKS">Drinks</option>

              </select>

            </div>

            <div class="admin-form-group">

              <label>Price (₹) *</label>

              <input type="number" id="itemPrice" required placeholder="0.00">

            </div>

          </div>

          <div class="admin-form-group">

            <label>Description</label>

            <textarea id="itemDesc" rows="3" placeholder="Tell us about the dish..."></textarea>

          </div>

          <div class="admin-form-group">

            <label>Image URL</label>

            <input type="text" id="itemImage" placeholder="https://example.com/image.jpg">

          </div>

          <div style="display:flex;align-items:center;gap:1rem">

            <div class="admin-form-group" style="margin:0">

              <label>Available</label>

              <div class="toggle-switch">

                <input type="checkbox" id="itemAvailable" checked>

                <span class="toggle-slider"></span>

              </div>

            </div>

          </div>

        </div>

        <div class="admin-modal-footer">

          <button type="button" class="btn-sm btn-outline-sm" onclick="closeMenuModal()">Cancel</button>

          <button type="submit" class="btn-sm btn-gold">💾 Save Item</button>

        </div>

      </form>

    </div>

  </div>



  <script src="../js/admin.js"></script>

  <script>

    let menuData = [];



    async function loadMenu() {

      const cat = document.getElementById('catFilter').value;

      const search = document.getElementById('menuSearch').value.toLowerCase();

      const tbody = document.getElementById('menuTable');

      if (!tbody) return;



      tbody.innerHTML = '<tr><td colspan="7" class="admin-loading-spinner"><div class="spinner"></div></td></tr>';



      try {

        const res = await adminFetch('/menu');

        const data = await res.json();

        menuData = data.menu || [];



        let filtered = menuData;

        if (cat) filtered = filtered.filter(m => m.category === cat);

        if (search) filtered = filtered.filter(m => m.name.toLowerCase().includes(search));



        tbody.innerHTML = filtered.length === 0

          ? '<tr><td colspan="7" class="admin-center-text admin-text-muted admin-p-2">No menu items found</td></tr>'

          : filtered.map(m => `

            <tr>

              <td><img src="${m.image || '../images/placeholder-food.png'}" class="admin-table-img" alt="${m.name}"></td>

              <td class="admin-bold">${m.name}</td>

              <td class="font-size-08 admin-text-muted">${m.category}</td>

              <td class="admin-text-gold admin-bold">₹${m.price}</td>

              <td class="admin-text-truncate" style="max-width:200px">${m.description || '-'}</td>

              <td><span class="badge ${m.available ? 'badge-success' : 'badge-cancelled'}">${m.available ? 'Available' : 'Sold Out'}</span></td>

              <td>

                <div class="admin-flex-gap">

                  <button class="btn-sm btn-outline-sm" onclick="editItem('${m.id}')">✏️</button>

                  <button class="btn-sm btn-danger-sm" onclick="deleteItem('${m.id}')">🗑️</button>

                </div>

              </td>

            </tr>`).join('');

      } catch (err) {

        tbody.innerHTML = '<tr><td colspan="7" class="admin-center-text admin-text-error admin-p-2">Failed to load menu.</td></tr>';

      }

    }



    function openMenuModal(id = null) {

      const modal = document.getElementById('menuModal');

      const form = document.getElementById('menuForm');

      const title = document.getElementById('modalTitle');

      

      form.reset();

      document.getElementById('itemId').value = '';

      title.textContent = 'Add Menu Item';



      if (id) {

        const item = menuData.find(m => m.id === id);

        if (item) {

          document.getElementById('itemId').value = item.id;

          document.getElementById('itemName').value = item.name;

          document.getElementById('itemCategory').value = item.category;

          document.getElementById('itemPrice').value = item.price;

          document.getElementById('itemDesc').value = item.description || '';

          document.getElementById('itemImage').value = item.image || '';

          document.getElementById('itemAvailable').checked = item.available;

          title.textContent = 'Edit Menu Item';

        }

      }

      modal.classList.add('open');

    }



    function closeMenuModal() {

      document.getElementById('menuModal').classList.remove('open');

    }



    function editItem(id) {

      openMenuModal(id);

    }



    async function deleteItem(id) {

      if (!confirm('Are you sure you want to delete this item?')) return;

      try {

        const res = await adminFetch(`/menu/${id}`, { method: 'DELETE' });

        const data = await res.json();

        if (data.success) {

          if (typeof showAdminToast === 'function') showAdminToast('Item deleted!', 'success');

          loadMenu();

        }

      } catch (err) {

        console.error('Delete error:', err);

      }

    }



    document.getElementById('menuForm').onsubmit = async function(e) {

      e.preventDefault();

      const id = document.getElementById('itemId').value;

      const payload = {

        name: document.getElementById('itemName').value,

        category: document.getElementById('itemCategory').value,

        price: parseFloat(document.getElementById('itemPrice').value),

        description: document.getElementById('itemDesc').value,

        image: document.getElementById('itemImage').value,

        available: document.getElementById('itemAvailable').checked

      };



      try {

        const url = id ? `/menu/${id}` : '/menu';

        const method = id ? 'PUT' : 'POST';

        const res = await adminFetch(url, { method, body: JSON.stringify(payload) });

        const data = await res.json();

        

        if (data.success) {

          if (typeof showAdminToast === 'function') showAdminToast(id ? 'Item updated!' : 'Item added!', 'success');

          closeMenuModal();

          loadMenu();

        } else {

          if (typeof showAdminToast === 'function') showAdminToast(data.message || 'Operation failed', 'error');

        }

      } catch (err) {

        console.error('Save error:', err);

      }

    };



    document.addEventListener('DOMContentLoaded', function() {

      if (typeof adminAuthGuard === 'function' && adminAuthGuard()) {

        loadMenu();

      }

    });

  </script>

</body>

</html>
